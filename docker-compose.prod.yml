services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: production
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build: ./backend
    command: python -m app.scheduler
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: production
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-12}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
      - goaccess_report:/srv/goaccess:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  goaccess:
    image: allinurl/goaccess
    volumes:
      - caddy_logs:/var/log/caddy:ro
      - goaccess_report:/report
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache jq
        while true; do
          if [ -f /var/log/caddy/access.log ]; then
            jq -r 'select(.request) | "\(.request.client_ip) - - [\(.ts|floor|gmtime|strftime("%d/%b/%Y:%H:%M:%S +0000"))] \"\(.request.method) \(.request.uri) \(.request.proto)\" \(.status) \(.size) \"\(.request.headers.Referer[0] // "-")\" \"\(.request.headers["User-Agent"][0] // "-")\""' /var/log/caddy/access.log > /tmp/clf.log
            goaccess /tmp/clf.log --log-format=COMBINED -o /report/index.html --ignore-crawlers -a
          fi
          sleep 300
        done
    depends_on:
      - caddy
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  goaccess_report:
